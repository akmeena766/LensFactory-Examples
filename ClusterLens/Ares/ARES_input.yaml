observation:
  modeler: LensFactory
  lens: Ares
  z_d: 0.5
  reference: [0.0, 0.0]
  pixel_scale: 0.05
  FOV: [200, 200]

cosmology:
  H0: 70.4
  Omega_m0: 0.272
  Omega_r0: 0.000
  Omega_w0: 0.728

source:
  from_file: true
  source_file: ARES_images.txt

scaling_relation:
  ref_mag: 18.5
  ref_sigma: 
    value: 100.0
    range: [50.0, 200.0]
  ref_core: 0.0
  ref_cut: 
    value: 30.0
    range: [1.0, 100.0]
  slope_sigma: 0.25
  slope_core: 0.50
  slope_cut: 0.50

